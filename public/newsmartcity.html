<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>newsmartcity</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }
    .gallery-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px; /* Space between each image */
      max-width: 800px;
      margin: 0 auto;
    }
    .gallery-image {
      width: 100%;       /* Makes images responsive */
      height: auto;      /* Maintains aspect ratio */
      max-width: 600px;  /* Prevents small images from stretching too wide */
      border-radius: 4px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <!-- The container where images will drop into -->
  <div class="gallery-container" id="gallery"></div>

  <script>
    // 1. MANUALLY LIST YOUR PNG FILENAMES HERE
    // Change "images/" to match your actual folder name
    const folderPath = "newsmartcity/"; 
    const imageFiles = [
      
      "Josef_Belton_2.png",
      "Josef_Belton_3.png",
      "Josef_Belton_4.png",
      "Josef_Belton_5.png",
      "Josef_Belton_6.png",
      "Josef_Belton_7.png",
      "Josef_Belton_8.png",
      "Josef_Belton_9.png",
      "Josef_Belton_10.png",
      
    ];

    const gallery = document.getElementById("gallery");

    // 2. Loop through the array and inject images into the page
    imageFiles.forEach(fileName => {
      const img = document.createElement("img");
      img.src = folderPath + fileName;
      img.alt = fileName;
      img.className = "gallery-image";
      gallery.appendChild(img);
    });
  </script>

</body>
</html>
